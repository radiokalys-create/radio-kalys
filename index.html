<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon site avec Radio Kalys</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #121212;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .radio-kalys {
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
    font-size: 2rem;
    gap: 1rem;
  }

  .radio-kalys input[type="radio"] {
    display: none;
  }

  .radio-custom {
    width: 80px;
    height: 80px;
    border: 4px solid #ff4081;
    border-radius: 50%;
    position: relative;
    transition: all 0.3s ease;
  }

  .radio-custom::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 40px;
    height: 40px;
    background: #ff4081;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    transition: all 0.3s ease;
  }

  .radio-kalys input[type="radio"]:checked + .radio-custom::after {
    transform: translate(-50%, -50%) scale(1);
  }

  .radio-label {
    font-size: 2rem;
    font-weight: bold;
    text-transform: uppercase;
    color: #ff4081;
  }

</style>
</head>
<body>

<label class="radio-kalys">
  <input type="radio" name="kalys" />
  <div class="radio-custom"></div>
  <span class="radio-label">Kalys</span>
</label>

</body>
</html>
