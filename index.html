<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Kalys</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #121212;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    height: 100vh;
    padding: 20px;
  }

  /* Bouton radio Kalys */
  .radio-kalys {
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
    font-size: 2rem;
    gap: 1rem;
    margin-top: 40px;
  }

  .radio-kalys input[type="radio"] {
    display: none;
  }

  .radio-custom {
    width: 120px;
    height: 120px;
    border: 5px solid #ff4081;
    border-radius: 50%;
    position: relative;
    transition: all 0.3s ease;
  }

  .radio-custom::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60px;
    height: 60px;
    background: #ff4081;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    transition: all 0.3s ease;
  }

  .radio-kalys input[type="radio"]:checked + .radio-custom::after {
    transform: translate(-50%, -50%) scale(1);
  }

  .radio-label {
    font-size: 2rem;
    font-weight: bold;
    text-transform: uppercase;
    color: #ff4081;
  }

  /* Sous-titre */
  .subtitle {
    margin-top: 20px;
    font-size: 1.5rem;
    color: #ff4081;
    text-align: center;
  }

  /* Lecteur audio en bas */
  audio {
    width: 100%;
    max-width: 400px;
    margin-bottom: 40px;
  }
</style>
</head>
<body>

<!-- Bouton radio Kalys -->
<label class="radio-kalys">
  <input type="radio" name="radio" checked />
  <div class="radio-custom"></div>
  <span class="radio-label">Kalys</span>
</label>

<!-- Sous-titre -->
<div class="subtitle">La radio qui a du chien !</div>

<!-- Lecteur audio -->
<audio controls>
  <source src="votre-radio.mp3" type="audio/mpeg">
  Votre navigateur ne supporte pas l'élément audio.
</audio>

</body>
</html>
